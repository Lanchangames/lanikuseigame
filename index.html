<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ランぬ修行中！</title>
    
    <style>
        :root { 
            --p-light: #e0f7fa; 
            --p-main: #81d4fa; 
            --p-dark: #0288d1; 
            --danger: #ff5252; 
        }
        body { margin: 0; padding: 0; display: flex; justify-content: center; min-height: 100dvh; background: #1a2a3a; font-family: 'Hiragino Maru Gothic Pro', sans-serif; overflow: hidden; }
        
        #game-container { 
            width: 100vw; max-width: 450px; height: 100dvh; 
            background: white; position: relative; display: flex; flex-direction: column; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); overflow: hidden; 
            transition: background 0.5s ease;
        }
        
        /* レベル別背景色 */
        .bg-lv1 { background: radial-gradient(circle, #fff 0%, #e0f7fa 100%) !important; }
        .bg-lv2 { background: radial-gradient(circle, #fff 0%, #e8f5e9 100%) !important; }
        .bg-lv3 { background: radial-gradient(circle, #fff 0%, #fff9c4 100%) !important; }
        .bg-lv4 { background: radial-gradient(circle, #fff 0%, #ffe0b2 100%) !important; }
        .bg-lv5 { background: radial-gradient(circle, #fff 0%, #f8bbd0 100%) !important; }
        .bg-lv6 { background: radial-gradient(circle, #fff 0%, #e1bee7 100%) !important; }
        .bg-lv7 { background: radial-gradient(circle, #fff 0%, #d1c4e9 100%) !important; }
        
        .bg-rainbow {
            animation: rainbowBG 1.5s linear infinite !important;
        }
        @keyframes rainbowBG {
            0% { background: #ffcccc; }
            20% { background: #ccffcc; }
            40% { background: #ccccff; }
            60% { background: #ffffcc; }
            80% { background: #ffccff; }
            100% { background: #ffcccc; }
        }

        #timer-area { flex-shrink: 0; padding-top: 10px; background: rgba(255,255,255,0.7); z-index: 20; }
        #timer-display { text-align: center; font-size: 28px; font-weight: bold; color: var(--p-dark); margin: 0; }
        #limit-display { text-align: center; font-size: 16px; font-weight: bold; color: var(--danger); margin: 2px 0 5px 0; }
        
        #header { padding: 0 20px 5px; text-align: center; }
        .stats { font-weight: bold; color: var(--p-dark); font-size: 14px; margin-bottom: 2px; }
        #exp-bar-bg { width: 100%; height: 10px; background: rgba(0,0,0,0.1); border-radius: 5px; }
        #exp-bar-fill { width: 0%; height: 100%; background: var(--p-dark); transition: width 0.2s; }
        
        #stage { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; min-height: 200px; }
        #msg-bubble { background: white; padding: 10px 15px; border-radius: 20px; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); font-weight: bold; width: 85%; text-align: center; border: 2px solid var(--p-main); z-index: 5; font-size: 14px; }
        #avatar-container { width: 60%; max-height: 250px; aspect-ratio: 1/1; display: flex; justify-content: center; align-items: flex-end; transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #avatar-img { max-width: 100%; max-height: 100%; object-fit: contain; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1)); }
        
        #tray-scroll-area { flex-shrink: 0; height: 200px; background: rgba(255,255,255,0.5); border-top: 1px solid rgba(0,0,0,0.1); overflow-y: auto; }
        #tray { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 12px 12px 30px; }
        .item-btn { border: 1px solid rgba(0,0,0,0.1); border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80px; cursor: pointer; background: white; transition: 0.1s; }
        .item-label { font-size: 9px; font-weight: bold; color: #666; margin-top: 2px; text-align: center; }
        .item-btn span { font-size: 24px; }
        .item-btn:active { transform: scale(0.9); }
        .item-btn.disabled { opacity: 0.2; pointer-events: none; }
        
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(2, 136, 209, 0.98); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; color: white; text-align: center; padding: 20px; box-sizing: border-box; }
        .btn-main { margin-top: 20px; padding: 12px 30px; border-radius: 25px; border: none; background: white; color: var(--p-dark); font-weight: bold; cursor: pointer; font-size: 18px; }
        .best-score { margin-top: 10px; font-size: 16px; color: #fff; background: rgba(0,0,0,0.2); padding: 5px 15px; border-radius: 15px; }
        .sulking { animation: shake 0.1s infinite; }
        .sulking-filter { filter: grayscale(1) contrast(1.2) opacity(0.7) !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(5px); } }
    </style>
</head>
<body>

<div id="game-container" class="bg-lv1">
    <div id="start-screen" class="overlay">
        <h1 style="font-size: 24px;">ランぬ修行中！</h1>
        <p style="font-size: 14px;">ランぬの要求にこたえて修行のお手伝い！<br>ぬい界の頂点を目指せ！</p>
        <div id="best-score-display" class="best-score">Best Time: --.-s</div>
        <button class="btn-main" onclick="initAudio(); startGame();">修行をはじめる！</button>
    </div>

    <div id="gameover-screen" class="overlay" style="display: none; background: rgba(0,0,0,0.9);">
        <h1 style="font-size: 32px; color: var(--danger);">TIME UP...</h1>
        <button class="btn-main" onclick="location.reload()">リベンジだ！</button>
    </div>

    <div id="result-screen" class="overlay" style="display: none;">
        <h1 style="font-size: 32px;">修行完了！</h1>
        <div id="final-time" style="font-size: 40px; font-weight: bold; margin: 10px 0;"></div>
        <div id="new-record-msg" style="color: #ffd700; font-weight: bold; margin-bottom: 10px; display: none;">New Record!</div>
        <button class="btn-main" onclick="shareX()" style="background: #1DA1F2; color: white;">報告する</button>
        <button onclick="location.reload()" style="background:none; border:none; color:white; margin-top:15px; text-decoration:underline; cursor:pointer; font-size:14px;">タイトルへ</button>
    </div>

    <div id="timer-area">
        <p id="timer-display">0.00</p>
        <p id="limit-display">残り: <span id="time-left">60.0</span>s</p>
        <div id="header">
            <div class="stats">修行Lv. <span id="lv">1</span> / 8</div>
            <div id="exp-bar-bg"><div id="exp-bar-fill"></div></div>
        </div>
    </div>

    <div id="stage">
        <div id="msg-bubble"><span id="wanted">準備中...</span></div>
        <div id="avatar-container">
            <img src="avatar.png" id="avatar-img" alt="ランぬ" onerror="this.style.display='none';">
        </div>
    </div>

    <div id="tray-scroll-area">
        <div id="tray"></div>
    </div>
</div>

<script>
    let audioCtx = null;
    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function playTone(freq, type, duration, vol=0.1) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }
    const sounds = {
        correct: () => { playTone(880, 'sine', 0.2); playTone(1320, 'sine', 0.2); },
        wrong: () => { playTone(200, 'sawtooth', 0.5, 0.05); },
        lvUp: () => { [523, 659, 783, 1046].forEach((f, i) => setTimeout(() => playTone(f, 'square', 0.4, 0.05), i * 100)); },
        click: () => { playTone(600, 'sine', 0.1, 0.05); }
    };

    const TIME_LIMIT = 60;
    const MAX_LEVEL = 8;
    let love = 0, lv = 1, wantedItem = "", isLocked = false, startTime = 0, gameActive = false, feintTimeout = null;
    
    const itemData = [
        { name: 'クッキー', icon: '🍪' }, { name: 'くまのぬいぐるみ', icon: '🧸' }, { name: 'アイス', icon: '🍦' },
        { name: '剣', icon: '⚔️' }, { name: '本', icon: '📚' }, { name: 'ねこ', icon: '🐱' }
    ];

    window.onload = function() {
        const bestTime = localStorage.getItem('rannu_ta_best');
        if (bestTime) document.getElementById('best-score-display').innerText = `Best Time: ${parseFloat(bestTime).toFixed(2)}s`;
        renderButtons();
    };

    function renderButtons() {
        const tray = document.getElementById('tray');
        let currentItems = [...itemData];
        if (lv >= 6) {
            for (let i = currentItems.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [currentItems[i], currentItems[j]] = [currentItems[j], currentItems[i]];
            }
        }
        tray.innerHTML = '';
        currentItems.forEach(item => {
            const btn = document.createElement('div');
            btn.className = 'item-btn';
            btn.onclick = () => tapItem(item.name);
            btn.innerHTML = `<span>${item.icon}</span><div class="item-label">${item.name}</div>`;
            tray.appendChild(btn);
        });
    }

    function startGame() {
        document.getElementById('start-screen').style.display = 'none';
        gameActive = true;
        startTime = Date.now();
        love = 0; lv = 1; isLocked = false;
        updateBackground();
        renderButtons();
        setWanted();
        requestAnimationFrame(updateTimer);
    }

    function updateTimer() {
        if (!gameActive) return;
        const elapsed = (Date.now() - startTime) / 1000;
        const remaining = Math.max(0, TIME_LIMIT - elapsed);
        document.getElementById('timer-display').innerText = elapsed.toFixed(2);
        document.getElementById('time-left').innerText = remaining.toFixed(1);
        if (remaining <= 0) { gameOver(); return; }
        requestAnimationFrame(updateTimer);
    }

    function updateBackground() {
        const container = document.getElementById('game-container');
        container.className = ''; 
        if (lv === MAX_LEVEL) container.classList.add('bg-rainbow');
        else container.classList.add(`bg-lv${lv}`);
    }

    function setWanted() {
        if (!gameActive || isLocked) return;
        clearTimeout(feintTimeout);
        const randIndex = Math.floor(Math.random() * itemData.length);
        wantedItem = itemData[randIndex].name;
        document.getElementById('wanted').innerText = wantedItem + " を頼む！";
        document.getElementById('msg-bubble').style.color = "black";

        const feintChance = lv === 1 ? 0 : 0.25 + (lv * 0.08);
        if (lv >= 2 && Math.random() < feintChance) {
            let feintDelay = Math.max(300, 950 - (lv * 70)); 
            feintTimeout = setTimeout(() => {
                if(!gameActive || isLocked) return;
                let newItem;
                do { newItem = itemData[Math.floor(Math.random() * itemData.length)].name; } while (newItem === wantedItem);
                wantedItem = newItem;
                document.getElementById('wanted').innerText = "あ、やっぱり " + wantedItem + "！";
                document.getElementById('msg-bubble').style.color = "var(--danger)";
            }, feintDelay);
        }
    }

    function tapItem(name) {
        if (!gameActive || isLocked) return;
        sounds.click();
        if (name === wantedItem) {
            sounds.correct();
            love += 25;
            const av = document.getElementById('avatar-container');
            av.style.transform = "translateY(-10px)";
            setTimeout(() => av.style.transform = "translateY(0)", 150);
            if (love >= 100) levelUp(); else { if(lv >= 6) renderButtons(); setWanted(); }
        } else {
            sounds.wrong();
            applyPenalty();
        }
        updateUI();
    }

    function applyPenalty() {
        isLocked = true;
        clearTimeout(feintTimeout); 
        document.getElementById('avatar-container').classList.add('sulking');
        document.getElementById('avatar-img').classList.add('sulking-filter');
        document.getElementById('msg-bubble').style.backgroundColor = "#f5f5f5";
        document.getElementById('wanted').innerText = "えっ、それじゃないぞ！";
        document.querySelectorAll('.item-btn').forEach(b => b.classList.add('disabled'));
        setTimeout(() => {
            if (!gameActive) return;
            isLocked = false;
            document.getElementById('avatar-container').classList.remove('sulking');
            document.getElementById('avatar-img').classList.remove('sulking-filter');
            document.getElementById('msg-bubble').style.backgroundColor = "white";
            document.querySelectorAll('.item-btn').forEach(b => b.classList.remove('disabled'));
            if (lv >= 6) renderButtons();
            setWanted();
        }, 1500);
    }

    function levelUp() {
        lv++; love = 0;
        updateBackground();
        if (lv > MAX_LEVEL) { finishGame(); return; }
        sounds.lvUp();
        isLocked = true;
        
        // ★レベルアップメッセージの出し分け
        let lvMsg = "";
        if (lv === 8) lvMsg = "もっと修行に付き合ってくれ！";
        else lvMsg = "ありがとう！俺、もっとやれるぞ！";
        
        document.getElementById('wanted').innerText = lvMsg;
        
        setTimeout(() => { 
            if (!gameActive) return; 
            isLocked = false; 
            renderButtons(); 
            setWanted(); 
            updateUI(); 
        }, 1200);
    }

    function gameOver() { sounds.wrong(); gameActive = false; document.getElementById('gameover-screen').style.display = 'flex'; }

    function finishGame() {
        gameActive = false;
        const finalTime = parseFloat(document.getElementById('timer-display').innerText);
        document.getElementById('final-time').innerText = finalTime.toFixed(2) + "s";
        const prevBest = localStorage.getItem('rannu_ta_best');
        if (!prevBest || finalTime < parseFloat(prevBest)) {
            localStorage.setItem('rannu_ta_best', finalTime);
            document.getElementById('new-record-msg').style.display = 'block';
        }
        document.getElementById('result-screen').style.display = 'flex';
    }

    function updateUI() { document.getElementById('lv').innerText = Math.min(lv, MAX_LEVEL); document.getElementById('exp-bar-fill').style.width = love + "%"; }
    function shareX() {
        const time = document.getElementById('timer-display').innerText;
        const text = encodeURIComponent(`ランぬ、【限界突破】記録${time}で修行完了だ！ #ランぬ修行中`);
        window.open(`https://twitter.com/intent/tweet?text=${text}`, '_blank');
    }
</script>

</body>
</html>
